version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=toeic_secret_access_token_key_2026
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # To switch Prisma to PostgreSQL in production:
      # 1. Update prisma/schema.prisma provider mapping to "postgresql" and use env("DATABASE_URL")
      # 2. Uncomment the DATABASE_URL environment line below:
      # - DATABASE_URL=postgresql://toeic_user:toeic_pass@postgres_db:5432/toeic_db?schema=public
    depends_on:
      - postgres_db

  postgres_db:
    image: postgres:15-alpine
    container_name: toeic_postgres
    restart: always
    environment:
      POSTGRES_USER: toeic_user
      POSTGRES_PASSWORD: toeic_pass
      POSTGRES_DB: toeic_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
